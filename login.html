<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style page de connexion avec animation.css">
    <link rel="stylesheet" href="style_login.css">
    <title>page de connexion</title>
</head>
<body>
    <div class="container">
        <form id="authForm">
        <div class="login-box">
                <h2>Connexion / Inscription</h2>
                <div class="input-box">
                    <input id="email" type="email" required/><label>Email</label>
                </div>
                <div class="input-box">
                    <input id="password" type="password" required /><label>Mot de passe</label>
                </div>
                <div class="input-box">
                    <label for="role">Rôle</label>
                    <select id="role">
                        <option value="client">Client</option>
                        <option value="vendeur">Vendeur</option>
                    </select>
                </div>
                <div class="forgot-pass">
                    <a href="#">Mot de passe oublié ?</a>
                </div>
                <button type="button" id="loginBtn" class="btn">Se connecter</button>
                <button type="button" id="registerBtn" class="btn">S'inscrire</button>
        </div>
        </form>
    </div>
    <script src="frontend.js"></script>
    <script>
      document.getElementById('loginBtn')?.addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const res = await window.ECOM.login(email, password);
        if (res.token) {
          alert('Connecté');
          window.location.href = 'e-commerce.html';
        } else alert(res.message || 'Erreur');
      });

      document.getElementById('registerBtn')?.addEventListener('click', async () => {
        const name = prompt('Nom complet');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;
        const res = await window.ECOM.register({ name, email, password, role });
        alert(res.message || JSON.stringify(res));
      });
    </script>
</body>
</html>
